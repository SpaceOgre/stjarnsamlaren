<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stjärnsamlaren</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <div class="topbar">
        <h1>Stjärnsamlaren</h1>
        <div class="score">
          Poäng: <span id="score">0</span>
          <span class="lives">Liv: <span id="lives">3</span></span>
          <button id="restart" type="button">Starta om</button>
        </div>
      </div>

      <div class="play-area">
        <canvas id="game" width="720" height="420" aria-label="Spelyta"></canvas>

        <div class="touch-controls" aria-label="Pekkontroller">
          <button class="control-button up" type="button" data-control="up" aria-label="Upp">&uarr;</button>
          <button class="control-button left" type="button" data-control="left" aria-label="Vänster">&larr;</button>
          <button class="control-button down" type="button" data-control="down" aria-label="Ner">&darr;</button>
          <button class="control-button right" type="button" data-control="right" aria-label="Höger">&rarr;</button>
        </div>
      </div>

      <p class="hint">Använd piltangenterna, WASD eller knapparna för att samla stjärnor.</p>
      <p class="version">Version: plattfix 2</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
